<!DOCTYPE html>

<html>

<head>

<title>Sentinel AI Bot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {

  margin: 0;

  background: black;

  color: white;

  font-family: Arial;

}

.chat-container {

  display: flex;

  flex-direction: column;

  height: 100vh;

  max-width: 500px;

  margin: 0 auto;

}

.header {

  padding: 15px;

  text-align: center;

  font-size: 20px;

  color: #00ffcc;

  border-bottom: 1px solid #333;

}

.chat-box {

  flex: 1;

  padding: 10px;

  overflow-y: auto;

}

.message {

  margin: 8px 0;

}

.user {

  text-align: right;

}

.bot {

  text-align: left;

  color: #00ffcc;

}

.input-box {

  display: flex;

  border-top: 1px solid #333;

  background: black;

  padding: 10px;

}

input {

  flex: 1;

  padding: 12px;

  border: none;

  outline: none;

}

button {

  padding: 12px;

  margin-left: 5px;

  border: none;

  background: #00ffcc;

  color: black;

}

</style>

</head>

<body>

<div class="chat-container">

  <div class="header">🚀 Sentinel AI Bot</div>

  <div class="chat-box" id="chatBox">

    <div class="message bot">Hello! Ask me about BTC or ETH 📊</div>

  </div>

  <div class="input-box">

    <input type="text" id="userInput" placeholder="Type message...">

    <button onclick="sendMessage()">Send</button>

  </div>

</div>

<script>

function sendMessage() {

  let input = document.getElementById("userInput");

  let msg = input.value.trim();

  if (msg === "") return;

  let chat = document.getElementById("chatBox");

  let user = document.createElement("div");

  user.className = "message user";

  user.innerText = msg;

  chat.appendChild(user);

  let bot = document.createElement("div");

  bot.className = "message bot";

  if (msg.toLowerCase().includes("btc")) {

    bot.innerText = "BTC is bullish 📈";

  } else if (msg.toLowerCase().includes("eth")) {

    bot.innerText = "ETH looks sideways ⚖️";

  } else {

    bot.innerText = "Analyzing... 🤖";

  }

  setTimeout(() => {

    chat.appendChild(bot);

    chat.scrollTop = chat.scrollHeight;

  }, 500);

  input.value = "";

}

</script>

</body>

</html>
