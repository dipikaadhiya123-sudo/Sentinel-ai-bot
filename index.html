<!DOCTYPE html>

<html>

<head>

<title>Sentinel AI Bot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

body {

  margin: 0;

  background: black;

  color: white;

  font-family: Arial;

}

.chat-container {

  display: flex;

  flex-direction: column;

  height: 100dvh;

  max-width: 500px;

  margin: 0 auto;

}

.header {

  padding: 15px;

  text-align: center;

  font-size: 20px;

  color: #00ffcc;

  border-bottom: 1px solid #333;

}

.chat-box {

  flex: 1;

  padding: 10px;

  overflow-y: auto;

}

.input-box {

  display: flex;

  border-top: 1px solid #333;

  background: black;

  padding: 10px;

  padding-bottom: calc(10px + env(safe-area-inset-bottom));

}

input {

  flex: 1;

  padding: 12px;

  border: none;

  outline: none;

  border-radius: 5px;

}

button {

  padding: 12px;

  margin-left: 5px;

  border: none;

  border-radius: 5px;

  background: #00ffcc;

  color: black;

  font-weight: bold;

}

</style>

</head>

<body>

<div class="chat-container">

  <div class="header">

    🚀 Sentinel AI Bot

  </div>

  <div class="chat-box">

    <p>Hello! Ask me about BTC or ETH 📊</p>

  </div>

  <div class="input-box">

    <input type="text" placeholder="Type message...">

    <button>Send</button>

  </div>

</div>

</body>

</html>
