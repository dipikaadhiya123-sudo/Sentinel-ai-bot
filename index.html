<!DOCTYPE html>
<html>
<head>
<title>Sentinel AI Bot</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
}

.chat-container {
  width: 100%;
  max-width: 500px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  color: #00ffcc;
  border-bottom: 1px solid #333;
}

.chat-box {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #00ffcc;
  color: black;
  align-self: flex-end;
}

.bot {
  background: #222;
  align-self: flex-start;
}

.input-box {
  display: flex;
  border-top: 1px solid #333;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

button {
  padding: 12px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">🚀 Sentinel AI Bot</div>

<div class="chat-box" id="chatBox">
  <div class="message bot">Hello! Ask me about the market 📊</div>
</div>

<div class="input-box">
  <input type="text" id="userInput" placeholder="Type your question...">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let message = input.value;

  if(message === "") return;

  let chatBox = document.getElementById("chatBox");

  // User message
  let userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = message;
  chatBox.appendChild(userMsg);

  // Bot reply
  let botMsg = document.createElement("div");
  botMsg.className = "message bot";

  if(message.toLowerCase().includes("btc")) {
    botMsg.innerText = "BTC looks bullish 📈";
  } else if(message.toLowerCase().includes("eth")) {
    botMsg.innerText = "ETH showing mixed signals ⚖️";
  } else {
    botMsg.innerText = "Analyzing market trends... 🤖";
  }

  setTimeout(() => {
    chatBox.appendChild(botMsg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);

  input.value = "";
}
</script>

</body>
</html>
